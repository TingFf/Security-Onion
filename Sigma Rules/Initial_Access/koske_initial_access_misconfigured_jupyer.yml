title: Koske - Suspicious Jupyter Lab HTTP Access
id: 7f3c9a52-9c1e-4f2d-bc3e-1c2a6d9e8b21
status: experimental
description: >
  Detects suspicious HTTP access to Jupyter Lab endpoints (/lab) from external sources,
  which may indicate initial access activity observed in the Koske malware campaign.
  Attackers may exploit exposed Jupyter instances to execute arbitrary code remotely.

author: Ting Feng
date: 2026-03-27

logsource:
  product: zeek
  service: http

detection:
  selection:
    uri|startswith: "/lab?"
  filter_loopback:
    dest_ip: 127.0.0.0/8
  filter_internal:
    dest_ip: src_ip
  condition: selection and not filter_loopback and not filter_internal

falsepositives:
  - Legitimate access to Jupyter Lab from trusted users
  - Internal development or data science environments

level: high

tags:
  - attack.initial_access
  - attack.t1071
